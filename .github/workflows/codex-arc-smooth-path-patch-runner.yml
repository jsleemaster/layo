name: Codex Arc Smooth Path Patch Runner

"on":
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  patch-arc-smooth-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-arc-smooth-path-artifacts
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch PDF SVG path parser
        run: |
          python scripts/codex-arc-smooth-path-patch.py
          git fetch origin main
          git show origin/main:.github/workflows/full-verification.yml > .github/workflows/full-verification.yml
          rm scripts/codex-arc-smooth-path-patch.py

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Focused GREEN test
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm --filter @layo/web test src/node-artifacts-arc-smooth.test.ts

      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/node-artifacts.ts .github/workflows/full-verification.yml scripts/codex-arc-smooth-path-patch.py
          if git diff --cached --quiet; then
            echo "No arc smooth path patch changes to commit"
            exit 0
          fi
          git commit -m "Preserve Penpot arc and smooth path PDF artifacts"
          git push origin HEAD:codex/penpot-arc-smooth-path-artifacts
