name: Codex radial stroke documentation update

on:
  push:
    branches:
      - codex/penpot-radial-stroke-raster-canvas
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-radial-stroke-raster-canvas

      - name: Patch radial stroke maturity docs
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const lines = (values) => values.join("\n") + "\n";
          function replaceOnce(text, search, replacement, label) {
            if (!text.includes(search)) {
              throw new Error(`Missing docs replacement target: ${label}`);
            }
            return text.replace(search, replacement);
          }

          fs.writeFileSync(
            "docs/product/penpot-radial-stroke-raster-canvas-delta.md",
            lines([
              "# Penpot Radial Stroke Raster Canvas Delta",
              "",
              "Date: 2026-07-06",
              "",
              "## Reference",
              "",
              "Penpot open-source snapshot: `penpot/penpot@a4ba5fc2e046d8583edcd4946f09e4ee64280431`. The relevant renderer path keeps radial paint as geometry rather than flattening it, and Layo already mirrors that evidence for selected-layer SVG and PDF radial stroke artifacts.",
              "",
              "## Decision",
              "",
              "Layo adapts this behavior for the supported selected-layer raster/canvas slice. The local-first importer keeps the original Penpot stroke paint source metadata under `style.paint_sources`; the web canvas now resolves supported radial stroke sources through the shared radial gradient geometry path instead of relying on the flattened midpoint stroke color.",
              "",
              "## Product Change",
              "",
              "- The canvas radial helper now resolves supported `fill` or `stroke` Penpot paint sources while preserving the existing single-source, normal-blend guardrails.",
              "- Supported radial strokes render through a Konva radial overlay. When the stroke does not fill the full rectangle, an inner fill mask restores the node fill area so the stroke ring remains gradient-painted.",
              "- Selected-layer PNG downloads now preserve the imported Penpot radial stroke gradient instead of sampling the older flattened purple fallback in the raster artifact path.",
              "",
              "## Verification",
              "",
              "- RED: Full Verification #28783504718 failed only in Playwright CLI e2e on `dev panel PNG raster artifact preserves the imported Penpot radial stroke gradient`; `centerStroke.r` was 128 instead of greater than `centerStroke.b + 40` (expected greater than 168).",
              "- Repair: Full Verification #28784248696 failed at the design-rule gate because the first implementation used a raw `#000000` fallback in TSX. The fallback now uses `editorKonvaTokens.selection.stroke`.",
              "- GREEN: Full Verification #28784374979 passed Penpot maturity/design gates, typecheck, web build, Core tests, and Playwright CLI e2e in 7m47s. Deployment remains intentionally deferred because Vercel is rate-limited and is not part of this product-maturity slice.",
              "",
              "## Remaining Gaps",
              "",
              "Non-rect/path/group/text radial artifacts, exact mixed-stack overlay/blend compositing, image-gradient interactions, masks, paths, SVG raw shapes, components, variants, tokens, and shared library relations remain follow-up import/export maturity gaps."
            ])
          );

          const benchmarkPath = "docs/product/penpot-maturity-benchmark.md";
          let benchmark = fs.readFileSync(benchmarkPath, "utf8");
          benchmark = replaceOnce(
            benchmark,
            "supported circular and width/ellipse selected-layer canvas/PNG radial fill artifacts, multiple gradient/stroke paint stacks",
            "supported circular and width/ellipse selected-layer canvas/PNG radial fill artifacts, and supported selected-layer canvas/PNG radial stroke artifacts, multiple gradient/stroke paint stacks",
            "benchmark import/export current posture radial stroke evidence"
          );
          benchmark = replaceOnce(
            benchmark,
            "`2026-07-06-penpot-radial-width-raster-canvas.md` extends that raster/canvas path by applying the same Penpot width/angle ellipse geometry through a generated Konva fill pattern. Exact mixed-stack overlay/blend compositing, radial stroke-specific proof, image-gradient interactions, non-rect/path gradient rendering, group/text gradient rendering, masks, paths, SVG raw shapes, components, variants, tokens, and shared library relations remain follow-up import/export gaps.",
            "`2026-07-06-penpot-radial-width-raster-canvas.md` extends that raster/canvas path by applying the same Penpot width/angle ellipse geometry through a generated Konva fill pattern. `2026-07-06-penpot-radial-stroke-raster-canvas.md` adapts the radial stroke selected-layer raster/canvas path by reusing the preserved Penpot radial paint geometry as a Konva overlay plus inner fill mask for supported rectangular stroke artifacts. Exact mixed-stack overlay/blend compositing, image-gradient interactions, non-rect/path gradient rendering, group/text gradient rendering, masks, paths, SVG raw shapes, components, variants, tokens, and shared library relations remain follow-up import/export gaps.",
            "benchmark recent radial stroke evidence"
          );
          fs.writeFileSync(benchmarkPath, benchmark);

          const statusPath = "docs/superpowers/PLAN_STATUS.md";
          let status = fs.readFileSync(statusPath, "utf8");
          status = replaceOnce(
            status,
            "No active plan. Latest completed Penpot maturity-loop slice is `2026-07-06-penpot-radial-width-raster-canvas.md`; deployment remains intentionally deferred.",
            "No active plan. Latest completed Penpot maturity-loop slice is `2026-07-06-penpot-radial-stroke-raster-canvas.md`; deployment remains intentionally deferred.",
            "plan status latest completed slice"
          );
          status = replaceOnce(
            status,
            "| `2026-07-06-penpot-radial-width-raster-canvas.md` | Completed | Extends the supported Penpot radial raster/canvas path from circular gradients to width/ellipse geometry by rasterizing the Penpot width/angle transform into a Konva fill pattern for selected-layer canvas and PNG artifacts.",
            "| `2026-07-06-penpot-radial-stroke-raster-canvas.md` | Completed | Adapts supported Penpot radial stroke paint sources to live canvas rendering and selected-layer PNG raster artifacts by resolving stroke radial paint sources through the shared radial gradient helper and drawing a Konva radial overlay with an inner fill mask. The regression is `apps/web/e2e/external-migration-penpot-stroke-gradient.spec.ts`; RED Full Verification #28783504718 failed only in Playwright CLI e2e because `centerStroke.r` was 128 instead of greater than `centerStroke.b + 40` (expected greater than 168). Implementation repair Full Verification #28784248696 failed at the design-rule gate on a raw fallback color and was fixed by using `editorKonvaTokens.selection.stroke`. GREEN Full Verification #28784374979 passed Penpot maturity/design gates, typecheck, web build, Core tests, and Playwright CLI e2e in 7m47s. Product delta is recorded in `docs/product/penpot-radial-stroke-raster-canvas-delta.md`. Remaining gaps are non-rect/path/group/text radial artifacts, exact mixed-stack overlay/blend compositing, image-gradient interactions, masks, paths, SVG raw shapes, components, variants, tokens, and shared library relations; deployment remains intentionally deferred. |\n| `2026-07-06-penpot-radial-width-raster-canvas.md` | Completed | Extends the supported Penpot radial raster/canvas path from circular gradients to width/ellipse geometry by rasterizing the Penpot width/angle transform into a Konva fill pattern for selected-layer canvas and PNG artifacts.",
            "plan status insert radial stroke row"
          );
          status = status.replace(
            "Remaining gaps are radial stroke-specific proof, non-rect/path/group/text radial artifacts, exact mixed-stack overlay/blend compositing, image-gradient interactions, masks, paths, SVG raw shapes, components, variants, tokens, and shared library relations; deployment remains intentionally deferred. |",
            "Remaining gaps are non-rect/path/group/text radial artifacts, exact mixed-stack overlay/blend compositing, image-gradient interactions, masks, paths, SVG raw shapes, components, variants, tokens, and shared library relations; deployment remains intentionally deferred. |"
          );
          fs.writeFileSync(statusPath, status);
          NODE

      - name: Commit docs
        run: |
          rm .github/workflows/codex-radial-stroke-docs.yml
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git status --short
          git add docs/product/penpot-radial-stroke-raster-canvas-delta.md docs/product/penpot-maturity-benchmark.md docs/superpowers/PLAN_STATUS.md .github/workflows/codex-radial-stroke-docs.yml
          git commit -m "Record radial stroke raster canvas evidence"
          git push origin codex/penpot-radial-stroke-raster-canvas
