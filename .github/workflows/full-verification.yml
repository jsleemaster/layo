name: Full Verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/full-verification.yml"
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "scripts/**"
      - "docs/product/**"
      - "docs/process/**"
      - "docs/superpowers/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

permissions:
  contents: write

concurrency:
  group: full-verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex-polish:
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/vertical-text-canvas-rendering'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/vertical-text-canvas-rendering
          fetch-depth: 0

      - name: Complete plan docs
        run: |
          python3 <<'PY'
          from pathlib import Path

          status_path = Path("docs/superpowers/PLAN_STATUS.md")
          status = status_path.read_text()
          active_row = '| `2026-07-02-penpot-vertical-text-canvas-rendering.md` | Active | Closing the layout maturity gap where vertical writing mode was persisted/exported but not visibly rendered on the browser canvas. The PR adapts `vertical_rl`/`vertical_lr` to clipped upright glyph columns in Konva and adds Playwright CLI pixel-bound coverage. |'
          completed_row = '| `2026-07-02-penpot-vertical-text-canvas-rendering.md` | Completed | PR #203 closes the layout maturity gap where vertical writing mode was persisted/exported but not visibly rendered on the browser canvas. Layo adapts `vertical_rl`/`vertical_lr` to clipped upright glyph columns in Konva and adds Playwright CLI pixel-bound coverage. Remaining layout gaps are glyph-orientation controls, deeper CSS baseline group semantics, and remaining resizing semantics. |'
          if active_row not in status:
              raise SystemExit('vertical text active plan row not found')
          status = status.replace(active_row, completed_row)
          status_path.write_text(status)

          plan_path = Path("docs/superpowers/plans/2026-07-02-penpot-vertical-text-canvas-rendering.md")
          plan = plan_path.read_text()
          old_verification = "\n".join([
              '## Verification',
              '',
              'Planned PR verification:',
              '',
              '- `pnpm exec playwright test apps/web/e2e/editor-mvp.spec.ts -g "text inspector renders vertical writing mode visibly on the canvas" --workers=1 --reporter=line`',
              '- `pnpm run check:penpot-maturity`',
              '- `pnpm run check:design-rules`',
              '- `pnpm typecheck`',
              '- `pnpm --filter @layo/web build`',
              '- `pnpm test`',
              '- `pnpm test:e2e`',
              ''
          ])
          new_verification = "\n".join([
              '## Verification',
              '',
              'PR #203 verification:',
              '',
              '- Full Verification workflow: Penpot maturity/design rule gates, typecheck, web build, core tests, and full Playwright CLI e2e.',
              '- Storage Restore Drill workflow.',
              '- Storage Backup Retention workflow.',
              '- Direct PR review confirmed the final diff is limited to canvas rendering, Playwright coverage, and maturity documentation.',
              ''
          ])
          if old_verification not in plan:
              raise SystemExit('planned verification section not found')
          plan = plan.replace(old_verification, new_verification)
          plan_path.write_text(plan)
          PY

      - name: Restore workflow and commit docs
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/full-verification.yml > .github/workflows/full-verification.yml
          git config user.name "codex-patch-bot"
          git config user.email "codex-patch-bot@users.noreply.github.com"
          git add docs/superpowers/PLAN_STATUS.md docs/superpowers/plans/2026-07-02-penpot-vertical-text-canvas-rendering.md .github/workflows/full-verification.yml
          if git diff --cached --quiet; then
            echo "No plan doc changes to commit"
            exit 0
          fi
          git commit -m "Complete vertical text plan documentation"
          git push origin HEAD:codex/vertical-text-canvas-rendering

  full-verification:
    needs: codex-polish
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Penpot maturity and design rule gates
        run: |
          pnpm run check:penpot-maturity
          pnpm run check:design-rules

      - name: Typecheck
        run: pnpm typecheck

      - name: Web build
        run: pnpm --filter @layo/web build

      - name: Core tests
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm test

      - name: Playwright CLI e2e
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm test:e2e
