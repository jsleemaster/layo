name: Codex Review Fix

on:
  push:
    branches:
      - codex/penpot-last-baseline-layout

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/penpot-last-baseline-layout
          fetch-depth: 0
      - name: Apply review fixes
        run: |
          curl -fsSL https://raw.githubusercontent.com/jsleemaster/layo/956bcfa5dce9d73a87272df520902a8b0d0f4d95/.github/codex/review-fix.mjs -o /tmp/review-fix.mjs
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const path = '/tmp/review-fix.mjs';
          let source = readFileSync(path, 'utf8');
          source = source.replace('`${path} optional title y`, 1);', '`${path} optional title y`, path.includes("editor-state") ? 1 : 0);');
          writeFileSync(path, source, 'utf8');
          NODE
          node /tmp/review-fix.mjs
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 1
          fi
          git commit -m "Address last-baseline review findings"
          git push origin HEAD:codex/penpot-last-baseline-layout
