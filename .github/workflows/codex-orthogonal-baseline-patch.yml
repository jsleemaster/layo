name: Codex Orthogonal Baseline Patch

on:
  push:
    branches:
      - codex/penpot-orthogonal-baseline-synthesis
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-orthogonal-baseline-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-orthogonal-baseline-synthesis
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch RED tests
        run: node scripts/codex-orthogonal-baseline-patch.mjs tests

      - name: RED focused tests
        env:
          NODE_OPTIONS: --conditions=development
        run: |
          set +e
          pnpm --filter @layo/web exec vitest run src/editor-state.test.ts --reporter=dot
          web_status=$?
          pnpm --filter @layo/server exec vitest run src/layout.test.ts --reporter=dot
          server_status=$?
          set -e
          if [ "$web_status" -eq 0 ] || [ "$server_status" -eq 0 ]; then
            echo "Expected both focused suites to fail before implementation. web=$web_status server=$server_status"
            exit 1
          fi
          echo "RED confirmed: focused web and server layout tests fail before implementation."

      - name: Patch implementation and docs
        run: node scripts/codex-orthogonal-baseline-patch.mjs implementation

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: GREEN focused tests
        env:
          NODE_OPTIONS: --conditions=development
        run: |
          pnpm --filter @layo/web exec vitest run src/editor-state.test.ts --reporter=dot
          pnpm --filter @layo/server exec vitest run src/layout.test.ts --reporter=dot
          pnpm exec node scripts/run-e2e.mjs -- apps/web/e2e/editor-mvp.spec.ts --grep "baseline alignment visibly synthesizes vertical writing mode text to the row border edge" --reporter=line
          pnpm run check:penpot-maturity

      - name: Commit final patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/editor-state.ts apps/server/src/layout.ts apps/web/src/editor-state.test.ts apps/server/src/layout.test.ts apps/web/e2e/editor-mvp.spec.ts docs/product/penpot-maturity-benchmark.md docs/superpowers/PLAN_STATUS.md docs/superpowers/plans/2026-07-05-penpot-orthogonal-baseline-synthesis.md
          git commit -m "Add Penpot orthogonal baseline synthesis"
          git push origin codex/penpot-orthogonal-baseline-synthesis
