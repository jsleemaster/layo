name: Codex Arc Smooth Docs Patch Runner

"on":
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  patch-arc-smooth-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-arc-smooth-path-artifacts
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch docs
        run: |
          python scripts/codex-arc-smooth-docs-patch.py
          rm scripts/codex-arc-smooth-docs-patch.py

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Documentation gates
        run: |
          pnpm run check:penpot-maturity
          pnpm run check:design-rules

      - name: Commit docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/product/penpot-arc-smooth-path-artifacts-delta.md docs/product/penpot-maturity-benchmark.md scripts/codex-arc-smooth-docs-patch.py
          if git diff --cached --quiet; then
            echo "No arc smooth docs changes to commit"
            exit 0
          fi
          git commit -m "Document Penpot arc smooth path artifact delta"
          git push origin HEAD:codex/penpot-arc-smooth-path-artifacts
