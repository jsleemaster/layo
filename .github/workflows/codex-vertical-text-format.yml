name: Codex Vertical Text Format

on:
  push:
    branches:
      - codex/vertical-text-canvas-rendering
    paths:
      - ".github/workflows/codex-vertical-text-format.yml"

permissions:
  contents: write

jobs:
  apply-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Format vertical text render branch
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent

          path = Path("apps/web/src/App.tsx")
          app = path.read_text()
          start_marker = ') : node.kind === "text" && node.content.type === "text" ? (\n'
          end_marker = '    ) : (\n      <Rect\n'
          start = app.index(start_marker)
          end = app.index(end_marker, start)
          replacement = dedent('''\
              ) : node.kind === "text" && node.content.type === "text" ? (
                isVerticalCanvasTextMode(node.content.writing_mode) ? (
                  <VerticalCanvasText
                    width={node.size.width}
                    height={node.size.height}
                    value={node.content.value}
                    fontSize={node.content.font_size}
                    fontFamily={node.content.font_family}
                    fill={node.style.fill}
                    writingMode={node.content.writing_mode}
                    shadowProps={shadowProps}
                  />
                ) : (
                  <Text
                    width={node.size.width}
                    height={node.size.height}
                    text={node.content.value}
                    fontSize={node.content.font_size}
                    fontFamily={node.content.font_family}
                    fill={node.style.fill}
                    {...shadowProps}
                  />
                )
          ''')
          app = app[:start] + replacement + app[end:]
          path.write_text(app)
          PY

      - name: Remove temporary format workflow
        run: rm .github/workflows/codex-vertical-text-format.yml

      - name: Commit format fix
        run: |
          git config user.name "codex-patch-bot"
          git config user.email "codex-patch-bot@users.noreply.github.com"
          git add apps/web/src/App.tsx .github/workflows/codex-vertical-text-format.yml
          if git diff --cached --quiet; then
            echo "No format changes to commit"
            exit 0
          fi
          git commit -m "Format vertical text canvas branch"
          git push origin HEAD:${{ github.ref_name }}
