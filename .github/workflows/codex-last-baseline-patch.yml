name: Codex Last Baseline Patch

on:
  push:
    branches:
      - codex/penpot-last-baseline-layout

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/penpot-last-baseline-layout
          fetch-depth: 0
      - name: Apply last-baseline patch
        run: node .github/codex/last-baseline-patch.mjs
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 1
          fi
          git commit -m "Implement Penpot last-baseline layout groups"
          git push origin HEAD:codex/penpot-last-baseline-layout
