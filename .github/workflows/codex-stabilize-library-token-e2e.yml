name: Codex Stabilize Library Token E2E

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Patch e2e wait
        run: node scripts/codex-stabilize-library-token-e2e.mjs
      - name: Remove temporary patch files
        run: |
          rm .github/workflows/codex-stabilize-library-token-e2e.yml
          rm scripts/codex-stabilize-library-token-e2e.mjs
      - name: Commit patch
        run: |
          git config user.name "codex"
          git config user.email "codex@users.noreply.github.com"
          git add apps/web/e2e/editor-mvp.spec.ts .github/workflows/codex-stabilize-library-token-e2e.yml scripts/codex-stabilize-library-token-e2e.mjs
          git commit -m "Stabilize library token update e2e wait"
          git push origin HEAD:${{ github.ref_name }}
