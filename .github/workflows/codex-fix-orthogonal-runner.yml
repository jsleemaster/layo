name: Codex Fix Orthogonal Patch Runner

on:
  push:
    branches:
      - codex/penpot-orthogonal-baseline-synthesis
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-orthogonal-baseline-synthesis
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch runner command
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, rmSync, writeFileSync } from "node:fs";
          const path = ".github/workflows/codex-orthogonal-baseline-patch.yml";
          let content = readFileSync(path, "utf8");
          content = content.replace("    if: github.actor != 'github-actions[bot]'\n", "");
          content = content.replace(
            "          pnpm exec playwright test apps/web/e2e/editor-mvp.spec.ts --grep \"baseline alignment visibly synthesizes vertical writing mode text to the row border edge\" --reporter=line",
            "          pnpm exec node scripts/run-e2e.mjs -- apps/web/e2e/editor-mvp.spec.ts --grep \"baseline alignment visibly synthesizes vertical writing mode text to the row border edge\" --reporter=line"
          );
          writeFileSync(path, content);
          rmSync(".github/workflows/codex-fix-orthogonal-runner.yml");
          NODE

      - name: Commit fixed runner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/codex-orthogonal-baseline-patch.yml .github/workflows/codex-fix-orthogonal-runner.yml
          git commit -m "Fix orthogonal baseline patch workflow"
          git push origin codex/penpot-orthogonal-baseline-synthesis
