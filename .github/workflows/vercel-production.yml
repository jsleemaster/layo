name: Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      LAYO_REPOSITORY_ADMIN_TOKEN: ${{ secrets.LAYO_REPOSITORY_ADMIN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Vercel secrets
        shell: bash
        run: |
          missing=()
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID LAYO_REPOSITORY_ADMIN_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Vercel secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run deployment artifact tests
        run: node --test scripts/check-deployment-artifacts.test.mjs

      - name: Run Penpot maturity gate
        run: pnpm run check:penpot-maturity

      - name: Run design rules gate
        run: pnpm run check:design-rules

      - name: Install Vercel CLI
        run: npm install -g vercel@50.9.6

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel production output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt production output
        id: deploy-production
        shell: bash
        run: |
          deployment_output="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          printf '%s\n' "$deployment_output"
          deployment_url="$(printf '%s\n' "$deployment_output" | awk '/^https:\/\// { url=$0 } END { print url }')"
          if [ -z "$deployment_url" ]; then
            printf 'Could not find a deployment URL in vercel deploy output.\n' >&2
            exit 1
          fi
          printf 'url=%s\n' "$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Verify live Layo production URL
        run: pnpm run check:live-deployment -- --url "${{ steps.deploy-production.outputs.url }}"

      - name: Update GitHub About homepage
        env:
          GH_REPOSITORY_TOKEN: ${{ secrets.LAYO_REPOSITORY_ADMIN_TOKEN }}
          LAYO_DEPLOYMENT_URL: ${{ steps.deploy-production.outputs.url }}
        run: node scripts/sync-github-about-homepage.mjs --url "$LAYO_DEPLOYMENT_URL"
