name: Full Verification

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-text-orientation-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply text orientation patch
        run: |
          node <<'NODE'
          const fs = require('fs');

          function read(path) {
            return fs.readFileSync(path, 'utf8');
          }

          function write(path, content) {
            fs.writeFileSync(path, content);
          }

          function replaceOnce(path, search, replacement) {
            const source = read(path);
            if (!source.includes(search)) {
              throw new Error(`Missing expected block in ${path}: ${search.slice(0, 120)}`);
            }
            write(path, source.replace(search, replacement));
          }

          function replaceRegex(path, regex, replacement) {
            const source = read(path);
            if (!regex.test(source)) {
              throw new Error(`Missing expected pattern in ${path}: ${regex}`);
            }
            write(path, source.replace(regex, replacement));
          }

          function insertAfter(path, search, addition) {
            replaceOnce(path, search, `${search}${addition}`);
          }

          replaceOnce(
            'packages/renderer/src/index.ts',
            'export type TextWritingMode = "horizontal_tb" | "vertical_rl" | "vertical_lr";\nexport type ExportPresetFormat = "png" | "jpeg" | "webp" | "svg" | "pdf";',
            'export type TextWritingMode = "horizontal_tb" | "vertical_rl" | "vertical_lr";\nexport type TextOrientation = "mixed" | "upright" | "sideways";\nexport type ExportPresetFormat = "png" | "jpeg" | "webp" | "svg" | "pdf";'
          );
          replaceOnce(
            'packages/renderer/src/index.ts',
            '        writing_mode?: TextWritingMode;\n        typography_token?: string | null;',
            '        writing_mode?: TextWritingMode;\n        text_orientation?: TextOrientation;\n        typography_token?: string | null;'
          );

          replaceOnce(
            'apps/server/src/storage.ts',
            'export type TextWritingMode = "horizontal_tb" | "vertical_rl" | "vertical_lr";\nexport type ExportPresetFormat = "png" | "jpeg" | "webp" | "svg" | "pdf";',
            'export type TextWritingMode = "horizontal_tb" | "vertical_rl" | "vertical_lr";\nexport type TextOrientation = "mixed" | "upright" | "sideways";\nexport type ExportPresetFormat = "png" | "jpeg" | "webp" | "svg" | "pdf";'
          );
          replaceOnce(
            'apps/server/src/storage.ts',
            '        writing_mode?: TextWritingMode;\n        typography_token?: string | null;',
            '        writing_mode?: TextWritingMode;\n        text_orientation?: TextOrientation;\n        typography_token?: string | null;'
          );

          replaceOnce(
            'apps/web/src/document-api.ts',
            '    | { type: "text"; value: string; fontSize: number; fontFamily: string }',
            '    | {\n        type: "text";\n        value: string;\n        fontSize: number;\n        fontFamily: string;\n        writingMode?: string;\n        textOrientation?: string;\n        typographyToken?: string;\n        typographyStyle?: string;\n      }'
          );

          replaceOnce(
            'apps/server/src/code-export.ts',
            '  TextWritingMode\n} from "./storage.js";',
            '  TextOrientation,\n  TextWritingMode\n} from "./storage.js";'
          );
          replaceOnce(
            'apps/server/src/code-export.ts',
            '        writingMode?: TextWritingMode;\n        typographyToken?: string;',
            '        writingMode?: TextWritingMode;\n        textOrientation?: TextOrientation;\n        typographyToken?: string;'
          );
          replaceOnce(
            'apps/server/src/code-export.ts',
            '    if (node.content.writing_mode && node.content.writing_mode !== "horizontal_tb") {\n      content.writingMode = node.content.writing_mode;\n    }\n    if (node.content.typography_token) {',
            '    if (node.content.writing_mode && node.content.writing_mode !== "horizontal_tb") {\n      content.writingMode = node.content.writing_mode;\n    }\n    if (node.content.text_orientation && node.content.text_orientation !== "mixed") {\n      content.textOrientation = node.content.text_orientation;\n    }\n    if (node.content.typography_token) {'
          );
          replaceOnce(
            'apps/server/src/code-export.ts',
            '    if (node.content.writing_mode && node.content.writing_mode !== "horizontal_tb") {\n      lines.push(`  writing-mode: ${cssTextWritingMode(node.content.writing_mode)};`);\n    }\n    lines.push(`  line-height: ${cssTextLineHeightValue(node, tokenMap)};`);',
            '    if (node.content.writing_mode && node.content.writing_mode !== "horizontal_tb") {\n      lines.push(`  writing-mode: ${cssTextWritingMode(node.content.writing_mode)};`);\n    }\n    if (node.content.text_orientation && node.content.text_orientation !== "mixed") {\n      lines.push(`  text-orientation: ${cssTextOrientation(node.content.text_orientation)};`);\n    }\n    lines.push(`  line-height: ${cssTextLineHeightValue(node, tokenMap)};`);'
          );
          insertAfter(
            'apps/server/src/code-export.ts',
            'function cssTextWritingMode(value: TextWritingMode): string {\n  switch (value) {\n    case "vertical_rl":\n      return "vertical-rl";\n    case "vertical_lr":\n      return "vertical-lr";\n    case "horizontal_tb":\n    default:\n      return "horizontal-tb";\n  }\n}\n',
            '\nfunction cssTextOrientation(value: TextOrientation): string {\n  switch (value) {\n    case "upright":\n      return "upright";\n    case "sideways":\n      return "sideways";\n    case "mixed":\n    default:\n      return "mixed";\n  }\n}\n'
          );

          replaceOnce(
            'apps/server/src/agent-control.ts',
            '  NodeLayoutItem,\n  TextWritingMode\n} from "./storage";',
            '  NodeLayoutItem,\n  TextOrientation,\n  TextWritingMode\n} from "./storage";'
          );
          replaceOnce(
            'apps/server/src/agent-control.ts',
            '  text?: string;\n  componentDefinitionId?: string;',
            '  text?: string;\n  writingMode?: TextWritingMode;\n  textOrientation?: TextOrientation;\n  componentDefinitionId?: string;'
          );
          replaceOnce(
            'apps/server/src/agent-control.ts',
            '  | { type: "update_text"; nodeId: string; value: string }\n  | { type: "set_text_writing_mode"; nodeId: string; writingMode: TextWritingMode }\n  | {',
            '  | { type: "update_text"; nodeId: string; value: string }\n  | { type: "set_text_writing_mode"; nodeId: string; writingMode: TextWritingMode }\n  | { type: "set_text_orientation"; nodeId: string; textOrientation: TextOrientation }\n  | {'
          );
          replaceOnce(
            'apps/server/src/agent-control.ts',
            '      fontFamily?: string;\n      writingMode?: TextWritingMode;\n    }',
            '      fontFamily?: string;\n      writingMode?: TextWritingMode;\n      textOrientation?: TextOrientation;\n    }'
          );
          insertAfter(
            'apps/server/src/agent-control.ts',
            'const TEXT_WRITING_MODES = new Set<TextWritingMode>(["horizontal_tb", "vertical_rl", "vertical_lr"]);\n\nfunction normalizeTextWritingMode(value: TextWritingMode | undefined): TextWritingMode {\n  return value && TEXT_WRITING_MODES.has(value) ? value : "horizontal_tb";\n}\n',
            '\nconst TEXT_ORIENTATIONS = new Set<TextOrientation>(["mixed", "upright", "sideways"]);\n\nfunction normalizeTextOrientation(value: TextOrientation | undefined): TextOrientation {\n  return value && TEXT_ORIENTATIONS.has(value) ? value : "mixed";\n}\n'
          );
          replaceOnce(
            'apps/server/src/agent-control.ts',
            '    text: node.content.type === "text" ? node.content.value : undefined,\n    componentDefinitionId: node.component_instance?.definition_id,',
            '    text: node.content.type === "text" ? node.content.value : undefined,\n    writingMode: node.content.type === "text" ? node.content.writing_mode : undefined,\n    textOrientation: node.content.type === "text" ? node.content.text_orientation : undefined,\n    componentDefinitionId: node.component_instance?.definition_id,'
          );
          replaceOnce(
            'apps/server/src/agent-control.ts',
            '    case "set_text_writing_mode": {\n      const node = requireNode(document, command.nodeId);\n      if (node.content.type !== "text") {\n        throw new Error(`node is not text: ${command.nodeId}`);\n      }\n      node.content = { ...node.content, writing_mode: normalizeTextWritingMode(command.writingMode) };\n      return node.id;\n    }\n    case "create_rectangle": {',
            '    case "set_text_writing_mode": {\n      const node = requireNode(document, command.nodeId);\n      if (node.content.type !== "text") {\n        throw new Error(`node is not text: ${command.nodeId}`);\n      }\n      node.content = { ...node.content, writing_mode: normalizeTextWritingMode(command.writingMode) };\n      return node.id;\n    }\n    case "set_text_orientation": {\n      const node = requireNode(document, command.nodeId);\n      if (node.content.type !== "text") {\n        throw new Error(`node is not text: ${command.nodeId}`);\n      }\n      node.content = { ...node.content, text_orientation: normalizeTextOrientation(command.textOrientation) };\n      return node.id;\n    }\n    case "create_rectangle": {'
          );
          replaceOnce(
            'apps/server/src/agent-control.ts',
            '      if (command.writingMode) {\n        content.writing_mode = normalizeTextWritingMode(command.writingMode);\n      }\n      const node: DesignNode = {',
            '      if (command.writingMode) {\n        content.writing_mode = normalizeTextWritingMode(command.writingMode);\n      }\n      if (command.textOrientation) {\n        content.text_orientation = normalizeTextOrientation(command.textOrientation);\n      }\n      const node: DesignNode = {'
          );

          replaceOnce(
            'apps/server/src/mcp.ts',
            '        fontFamily: z.string().default("Inter"),\n        writingMode: z.enum(["horizontal_tb", "vertical_rl", "vertical_lr"]).optional()\n      }\n    },\n    async ({ fileId, parentId, id, name, value, x, y, width, height, fill, fontSize, fontFamily, writingMode }) => {',
            '        fontFamily: z.string().default("Inter"),\n        writingMode: z.enum(["horizontal_tb", "vertical_rl", "vertical_lr"]).optional(),\n        textOrientation: z.enum(["mixed", "upright", "sideways"]).optional()\n      }\n    },\n    async ({\n      fileId,\n      parentId,\n      id,\n      name,\n      value,\n      x,\n      y,\n      width,\n      height,\n      fill,\n      fontSize,\n      fontFamily,\n      writingMode,\n      textOrientation\n    }) => {'
          );
          replaceOnce(
            'apps/server/src/mcp.ts',
            '      if (writingMode) {\n        content.writing_mode = writingMode;\n      }\n      const node: DesignNode = {',
            '      if (writingMode) {\n        content.writing_mode = writingMode;\n      }\n      if (textOrientation) {\n        content.text_orientation = textOrientation;\n      }\n      const node: DesignNode = {'
          );

          replaceOnce(
            'apps/web/src/editor-state.ts',
            '  RendererNode,\n  TextWritingMode\n} from "@layo/renderer";',
            '  RendererNode,\n  TextOrientation,\n  TextWritingMode\n} from "@layo/renderer";'
          );
          replaceOnce(
            'apps/web/src/editor-state.ts',
            '  | {\n      type: "set_text_writing_mode";\n      nodeId: string;\n      writingMode: TextWritingMode;\n    }\n  | {',
            '  | {\n      type: "set_text_writing_mode";\n      nodeId: string;\n      writingMode: TextWritingMode;\n    }\n  | {\n      type: "set_text_orientation";\n      nodeId: string;\n      textOrientation: TextOrientation;\n    }\n  | {'
          );
          replaceOnce(
            'apps/web/src/editor-state.ts',
            '    case "set_text_writing_mode": {\n      const node = findNodeById(next, command.nodeId);\n      if (!node || isNodeLocked(node) || node.content.type !== "text") {\n        return { document, inverse: null };\n      }\n\n      const previousWritingMode = node.content.writing_mode ?? "horizontal_tb";\n      if (previousWritingMode === command.writingMode) {\n        return { document, inverse: null };\n      }\n\n      node.content = { ...node.content, writing_mode: command.writingMode };\n      relayoutDocument(next);\n\n      return {\n        document: next,\n        inverse: {\n          type: "set_text_writing_mode",\n          nodeId: command.nodeId,\n          writingMode: previousWritingMode\n        },\n        selectedNodeId: command.nodeId\n      };\n    }\n    case "set_text_typography_token": {',
            '    case "set_text_writing_mode": {\n      const node = findNodeById(next, command.nodeId);\n      if (!node || isNodeLocked(node) || node.content.type !== "text") {\n        return { document, inverse: null };\n      }\n\n      const previousWritingMode = node.content.writing_mode ?? "horizontal_tb";\n      if (previousWritingMode === command.writingMode) {\n        return { document, inverse: null };\n      }\n\n      node.content = { ...node.content, writing_mode: command.writingMode };\n      relayoutDocument(next);\n\n      return {\n        document: next,\n        inverse: {\n          type: "set_text_writing_mode",\n          nodeId: command.nodeId,\n          writingMode: previousWritingMode\n        },\n        selectedNodeId: command.nodeId\n      };\n    }\n    case "set_text_orientation": {\n      const node = findNodeById(next, command.nodeId);\n      if (!node || isNodeLocked(node) || node.content.type !== "text") {\n        return { document, inverse: null };\n      }\n\n      const previousTextOrientation = node.content.text_orientation ?? "mixed";\n      if (previousTextOrientation === command.textOrientation) {\n        return { document, inverse: null };\n      }\n\n      node.content = { ...node.content, text_orientation: command.textOrientation };\n\n      return {\n        document: next,\n        inverse: {\n          type: "set_text_orientation",\n          nodeId: command.nodeId,\n          textOrientation: previousTextOrientation\n        },\n        selectedNodeId: command.nodeId\n      };\n    }\n    case "set_text_typography_token": {'
          );

          replaceOnce(
            'apps/web/src/App.tsx',
            '  type RendererDocument,\n  type RendererNode,\n  type TextWritingMode\n} from "@layo/renderer";',
            '  type RendererDocument,\n  type RendererNode,\n  type TextOrientation,\n  type TextWritingMode\n} from "@layo/renderer";'
          );
          insertAfter(
            'apps/web/src/App.tsx',
            'async function persistTextWritingMode(fileId: string, nodeId: string, writingMode: TextWritingMode) {\n  const response = await fetch(apiUrl(`/files/${fileId}/agent/commands`), {\n    method: "POST",\n    headers: { "Content-Type": "application/json" },\n    body: JSON.stringify({\n      dryRun: false,\n      commands: [{ type: "set_text_writing_mode", nodeId, writingMode }]\n    })\n  });\n\n  if (!response.ok) {\n    throw new Error(`텍스트 쓰기 방향 저장 실패: ${response.status} ${response.statusText}`.trim());\n  }\n}\n',
            '\nasync function persistTextOrientation(fileId: string, nodeId: string, textOrientation: TextOrientation) {\n  const response = await fetch(apiUrl(`/files/${fileId}/agent/commands`), {\n    method: "POST",\n    headers: { "Content-Type": "application/json" },\n    body: JSON.stringify({\n      dryRun: false,\n      commands: [{ type: "set_text_orientation", nodeId, textOrientation }]\n    })\n  });\n\n  if (!response.ok) {\n    throw new Error(`텍스트 글자 방향 저장 실패: ${response.status} ${response.statusText}`.trim());\n  }\n}\n'
          );
          insertAfter(
            'apps/web/src/App.tsx',
            'function verticalCanvasTextGlyphs(value: string, fontSize: number, height: number) {\n  const lineAdvance = Math.max(1, Math.round(fontSize * 1.15));\n  const rowsPerColumn = Math.max(1, Math.floor(Math.max(1, height) / lineAdvance));\n  const glyphs: Array<{ glyph: string; row: number; column: number }> = [];\n  let row = 0;\n  let column = 0;\n\n  for (const glyph of Array.from(value)) {\n    if (glyph === "\\r") {\n      continue;\n    }\n    if (glyph === "\\n") {\n      column += 1;\n      row = 0;\n      continue;\n    }\n\n    glyphs.push({ glyph, row, column });\n    row += 1;\n\n    if (row >= rowsPerColumn) {\n      column += 1;\n      row = 0;\n    }\n  }\n\n  return { glyphs, lineAdvance };\n}\n',
            '\nfunction isSidewaysVerticalCanvasGlyph(glyph: string, textOrientation: TextOrientation): boolean {\n  if (textOrientation === "sideways") {\n    return glyph !== " ";\n  }\n  if (textOrientation === "upright") {\n    return false;\n  }\n  return /^[\\u0021-\\u007e]$/.test(glyph);\n}\n'
          );
          replaceOnce(
            'apps/web/src/App.tsx',
            '  writingMode,\n  shadowProps\n}: {\n  value: string;\n  fontSize: number;\n  fontFamily: string;\n  fill: string;\n  width: number;\n  height: number;\n  writingMode: "vertical_rl" | "vertical_lr";\n  shadowProps: CanvasTextShadowProps;\n}) {',
            '  writingMode,\n  textOrientation,\n  shadowProps\n}: {\n  value: string;\n  fontSize: number;\n  fontFamily: string;\n  fill: string;\n  width: number;\n  height: number;\n  writingMode: "vertical_rl" | "vertical_lr";\n  textOrientation: TextOrientation;\n  shadowProps: CanvasTextShadowProps;\n}) {'
          );
          replaceOnce(
            'apps/web/src/App.tsx',
            '        return (\n          <Text\n            key={`${index}-${glyph}`}\n            x={x}\n            y={row * lineAdvance}\n            width={columnAdvance}\n            height={lineAdvance}\n            text={glyph === " " ? "\\u00a0" : glyph}\n            fontSize={fontSize}\n            fontFamily={fontFamily}\n            fill={fill}\n            align="center"\n            {...shadowProps}\n          />\n        );',
            '        const y = row * lineAdvance;\n        const renderedGlyph = glyph === " " ? "\\u00a0" : glyph;\n        const renderSideways = isSidewaysVerticalCanvasGlyph(glyph, textOrientation);\n\n        return renderSideways ? (\n          <Text\n            key={`${index}-${glyph}`}\n            x={x + columnAdvance}\n            y={y}\n            width={lineAdvance}\n            height={columnAdvance}\n            text={renderedGlyph}\n            fontSize={fontSize}\n            fontFamily={fontFamily}\n            fill={fill}\n            align="center"\n            rotation={90}\n            {...shadowProps}\n          />\n        ) : (\n          <Text\n            key={`${index}-${glyph}`}\n            x={x}\n            y={y}\n            width={columnAdvance}\n            height={lineAdvance}\n            text={renderedGlyph}\n            fontSize={fontSize}\n            fontFamily={fontFamily}\n            fill={fill}\n            align="center"\n            {...shadowProps}\n          />\n        );'
          );
          replaceOnce(
            'apps/web/src/App.tsx',
            '          writingMode={node.content.writing_mode}\n          shadowProps={shadowProps}',
            '          writingMode={node.content.writing_mode}\n          textOrientation={node.content.text_orientation ?? "mixed"}\n          shadowProps={shadowProps}'
          );
          replaceOnce(
            'apps/web/src/App.tsx',
            '  onTextChange,\n  onTextWritingModeChange,\n  onTextTypographyTokenChange,',
            '  onTextChange,\n  onTextWritingModeChange,\n  onTextOrientationChange,\n  onTextTypographyTokenChange,'
          );
          replaceOnce(
            'apps/web/src/App.tsx',
            '  onTextWritingModeChange: (nodeId: string, writingMode: TextWritingMode) => void;\n  onTextTypographyTokenChange: (nodeId: string, tokenId: string) => void;',
            '  onTextWritingModeChange: (nodeId: string, writingMode: TextWritingMode) => void;\n  onTextOrientationChange: (nodeId: string, textOrientation: TextOrientation) => void;\n  onTextTypographyTokenChange: (nodeId: string, tokenId: string) => void;'
          );
          insertAfter(
            'apps/web/src/App.tsx',
            '          <label className="stacked-field">\n            쓰기 방향\n            <select\n              data-testid="inspector-text-writing-mode"\n              value={selectedNode.content.writing_mode ?? "horizontal_tb"}\n              onChange={(event) =>\n                onTextWritingModeChange(selectedNode.id, event.currentTarget.value as TextWritingMode)\n              }\n            >\n              <option value="horizontal_tb">가로</option>\n              <option value="vertical_rl">세로 오른쪽-왼쪽</option>\n              <option value="vertical_lr">세로 왼쪽-오른쪽</option>\n            </select>\n          </label>\n',
            '          <label className="stacked-field">\n            글자 방향\n            <select\n              data-testid="inspector-text-orientation"\n              value={selectedNode.content.text_orientation ?? "mixed"}\n              onChange={(event) =>\n                onTextOrientationChange(selectedNode.id, event.currentTarget.value as TextOrientation)\n              }\n            >\n              <option value="mixed">자동 혼합</option>\n              <option value="upright">항상 바로</option>\n              <option value="sideways">가로 눕힘</option>\n            </select>\n          </label>\n'
          );
          insertAfter(
            'apps/web/src/App.tsx',
            '  const updateTextWritingMode = (nodeId: string, writingMode: TextWritingMode) => {\n    dispatch({ type: "set_text_writing_mode", nodeId, writingMode });\n    if (!currentProject) {\n      return;\n    }\n    void persistTextWritingMode(currentProject.currentDocumentId, nodeId, writingMode)\n      .then(refreshCurrentFileFromServer)\n      .catch((error: unknown) => {\n        setSaveStatus(error instanceof Error ? error.message : "텍스트 쓰기 방향 저장 실패");\n      });\n  };\n',
            '\n  const updateTextOrientation = (nodeId: string, textOrientation: TextOrientation) => {\n    dispatch({ type: "set_text_orientation", nodeId, textOrientation });\n    if (!currentProject) {\n      return;\n    }\n    void persistTextOrientation(currentProject.currentDocumentId, nodeId, textOrientation)\n      .then(refreshCurrentFileFromServer)\n      .catch((error: unknown) => {\n        setSaveStatus(error instanceof Error ? error.message : "텍스트 글자 방향 저장 실패");\n      });\n  };\n'
          );
          replaceOnce(
            'apps/web/src/App.tsx',
            '        onTextWritingModeChange={updateTextWritingMode}\n        onTextTypographyTokenChange={updateTextTypographyToken}',
            '        onTextWritingModeChange={updateTextWritingMode}\n        onTextOrientationChange={updateTextOrientation}\n        onTextTypographyTokenChange={updateTextTypographyToken}'
          );

          replaceOnce(
            'crates/editor-core/src/model.rs',
            '        #[serde(default, skip_serializing_if = "Option::is_none")]\n        writing_mode: Option<String>,\n        #[serde(default, skip_serializing_if = "Option::is_none")]\n        typography_token: Option<String>,',
            '        #[serde(default, skip_serializing_if = "Option::is_none")]\n        writing_mode: Option<String>,\n        #[serde(default, skip_serializing_if = "Option::is_none")]\n        text_orientation: Option<String>,\n        #[serde(default, skip_serializing_if = "Option::is_none")]\n        typography_token: Option<String>,'
          );
          replaceOnce(
            'crates/editor-core/src/model.rs',
            '                            writing_mode: None,\n                            typography_token: None,',
            '                            writing_mode: None,\n                            text_orientation: None,\n                            typography_token: None,'
          );
          replaceOnce(
            'crates/editor-core/bindings/NodeContent.ts',
            'font_family: string, writing_mode?: string | null, typography_token?: string | null, typography_style?: string | null,',
            'font_family: string, writing_mode?: string | null, text_orientation?: string | null, typography_token?: string | null, typography_style?: string | null,'
          );
          replaceOnce(
            'crates/editor-core/tests/document_model.rs',
            '                "font_family": "Inter",\n                "writing_mode": "vertical_rl"',
            '                "font_family": "Inter",\n                "writing_mode": "vertical_rl",\n                "text_orientation": "sideways"'
          );
          replaceOnce(
            'crates/editor-core/tests/document_model.rs',
            '        editor_core::NodeContent::Text { writing_mode, .. } => {\n            assert_eq!(writing_mode.as_deref(), Some("vertical_rl"));\n        }',
            '        editor_core::NodeContent::Text {\n            writing_mode,\n            text_orientation,\n            ..\n        } => {\n            assert_eq!(writing_mode.as_deref(), Some("vertical_rl"));\n            assert_eq!(text_orientation.as_deref(), Some("sideways"));\n        }'
          );
          replaceOnce(
            'crates/editor-core/tests/document_model.rs',
            '    assert!(json.contains("\\\"writing_mode\\\":\\\"vertical_rl\\\""));',
            '    assert!(json.contains("\\\"writing_mode\\\":\\\"vertical_rl\\\""));\n    assert!(json.contains("\\\"text_orientation\\\":\\\"sideways\\\""));'
          );

          replaceOnce(
            'apps/server/src/code-export.test.ts',
            '    text.content = { ...text.content, writing_mode: "vertical_rl" } as any;',
            '    text.content = { ...text.content, writing_mode: "vertical_rl", text_orientation: "sideways" } as any;'
          );
          replaceOnce(
            'apps/server/src/code-export.test.ts',
            '      fontFamily: "Arial",\n      writingMode: "vertical_rl"\n    });\n    expect(result.css).toContain("writing-mode: vertical-rl;");',
            '      fontFamily: "Arial",\n      writingMode: "vertical_rl",\n      textOrientation: "sideways"\n    });\n    expect(result.css).toContain("writing-mode: vertical-rl;");\n    expect(result.css).toContain("text-orientation: sideways;");'
          );
          replaceOnce(
            'apps/server/src/storage.test.ts',
            '      { type: "set_text_writing_mode", nodeId: "text-1", writingMode: "vertical_rl" },',
            '      { type: "set_text_writing_mode", nodeId: "text-1", writingMode: "vertical_rl" },\n      { type: "set_text_orientation", nodeId: "text-1", textOrientation: "sideways" },'
          );
