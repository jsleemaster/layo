name: Codex radial artifact patch

on:
  push:
    branches:
      - codex/penpot-radial-gradient-svg-artifact

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Apply radial SVG artifact patch
        run: python3 scripts/codex-radial-patch.py
      - name: Commit patch and remove temporary files
        run: |
          rm -f .github/workflows/codex-radial-patch.yml scripts/codex-radial-patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/node-artifacts.ts .github/workflows/codex-radial-patch.yml scripts/codex-radial-patch.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "feat: support Penpot radial SVG artifacts"
          git push origin HEAD:${{ github.ref_name }}
