name: Codex radial plan status fix

on:
  push:
    branches:
      - codex/penpot-radial-gradient-svg-artifact

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Fix plan status table placement
        run: python3 scripts/codex-radial-plan-status-fix.py
      - name: Commit plan status fix and remove temporary files
        run: |
          rm -f .github/workflows/codex-radial-plan-status-fix.yml scripts/codex-radial-plan-status-fix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/superpowers/PLAN_STATUS.md .github/workflows/codex-radial-plan-status-fix.yml scripts/codex-radial-plan-status-fix.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: move radial evidence into completed plans"
          git push origin HEAD:${{ github.ref_name }}
