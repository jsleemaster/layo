name: Codex Vertical Text Fix

on:
  push:
    branches:
      - codex/vertical-text-canvas-rendering
    paths:
      - ".github/workflows/codex-vertical-text-fix.yml"

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix escaped vertical text helper source
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent
          import re

          path = Path("apps/web/src/App.tsx")
          app = path.read_text()
          start = app.index("function verticalCanvasTextGlyphs")
          end = app.index("\n\nfunction VerticalCanvasText", start)
          replacement = dedent(r'''
          function verticalCanvasTextGlyphs(value: string, fontSize: number, height: number) {
            const lineAdvance = Math.max(1, Math.round(fontSize * 1.15));
            const rowsPerColumn = Math.max(1, Math.floor(Math.max(1, height) / lineAdvance));
            const glyphs: Array<{ glyph: string; row: number; column: number }> = [];
            let row = 0;
            let column = 0;

            for (const glyph of Array.from(value)) {
              if (glyph === "\r") {
                continue;
              }
              if (glyph === "\n") {
                column += 1;
                row = 0;
                continue;
              }

              glyphs.push({ glyph, row, column });
              row += 1;

              if (row >= rowsPerColumn) {
                column += 1;
                row = 0;
              }
            }

            return { glyphs, lineAdvance };
          }
          ''').strip()
          app = app[:start] + replacement + app[end:]
          app = re.sub(
              r'text=\{glyph === " " \? .*? : glyph\}',
              lambda _: 'text={glyph === " " ? "\\u00a0" : glyph}',
              app,
              count=1,
          )
          path.write_text(app)
          PY

      - name: Remove temporary fix workflow
        run: rm .github/workflows/codex-vertical-text-fix.yml

      - name: Commit fix
        run: |
          git config user.name "codex-patch-bot"
          git config user.email "codex-patch-bot@users.noreply.github.com"
          git add apps/web/src/App.tsx .github/workflows/codex-vertical-text-fix.yml
          if git diff --cached --quiet; then
            echo "No fix changes to commit"
            exit 0
          fi
          git commit -m "Fix vertical text helper escapes"
          git push origin HEAD:${{ github.ref_name }}
