name: Codex Orthogonal Baseline Patch

on:
  push:
    branches:
      - codex/penpot-orthogonal-baseline-synthesis
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-orthogonal-baseline-synthesis
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch RED tests
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const read = (path) => readFileSync(path, "utf8");
          const write = (path, content) => writeFileSync(path, content);
          const block = (lines) => `${lines.join("\n")}\n\n`;

          function replaceOnce(content, before, after, label) {
            if (!content.includes(before)) {
              throw new Error(`Missing patch target: ${label}`);
            }
            return content.replace(before, after);
          }

          const webStateTestPath = "apps/web/src/editor-state.test.ts";
          let webStateTest = read(webStateTestPath);
          webStateTest = replaceOnce(
            webStateTest,
            `    expect(caption?.transform).toMatchObject({ x: 70, y: 27 });\n    expect((title?.transform.y ?? 0) + 20).toBe((caption?.transform.y ?? 0) + 13);`,
            `    expect(caption?.transform).toMatchObject({ x: 70, y: 103 });\n    expect((title?.transform.y ?? 0) + 96).toBe((caption?.transform.y ?? 0) + 13);`,
            "web vertical writing baseline expectation"
          );
          if (!webStateTest.includes("grid baseline alignment synthesizes vertical writing mode border-edge baselines")) {
            const gridWebTest = block([
              '  test("grid baseline alignment synthesizes vertical writing mode border-edge baselines", () => {',
              '    const document = sampleDocument();',
              '    const frame = findNodeById(document, "frame-1") as any;',
              '    frame.size = { width: 300, height: 140 };',
              '    frame.layout = {',
              '      mode: "grid",',
              '      direction: "horizontal",',
              '      grid_columns: 2,',
              '      grid_rows: 1,',
              '      align_items: "baseline",',
              '      justify_content: "start",',
              '      gap: 0,',
              '      row_gap: 0,',
              '      column_gap: 0,',
              '      padding: { top: 20, right: 20, bottom: 20, left: 20 }',
              '    } as any;',
              '    const text = findNodeById(document, "text-1") as any;',
              '    text.size = { width: 40, height: 96 };',
              '    text.content = {',
              '      type: "text",',
              '      value: "縦書き",',
              '      font_size: 32,',
              '      font_family: "Inter",',
              '      writing_mode: "vertical_rl"',
              '    };',
              '    frame.children.push({',
              '      id: "caption-1",',
              '      kind: "text",',
              '      name: "캡션",',
              '      transform: { x: 0, y: 0, rotation: 0 },',
              '      size: { width: 80, height: 24 },',
              '      style: { fill: "#374151", stroke: null, stroke_width: 0, opacity: 1 },',
              '      content: {',
              '        type: "text",',
              '        value: "Caption",',
              '        font_size: 16,',
              '        font_family: "Inter"',
              '      },',
              '      children: []',
              '    });',
              '',
              '    const relaid = executeEditorCommand(createEditorState(document), {',
              '      type: "update_node_geometry",',
              '      nodeId: "caption-1",',
              '      patch: { width: 80 }',
              '    });',
              '',
              '    const title = findNodeById(relaid.document, "text-1");',
              '    const caption = findNodeById(relaid.document, "caption-1");',
              '    expect(title?.transform).toMatchObject({ x: 20, y: 20 });',
              '    expect(caption?.transform).toMatchObject({ x: 150, y: 103 });',
              '    expect((title?.transform.y ?? 0) + 96).toBe((caption?.transform.y ?? 0) + 13);',
              '  });'
            ]);
            webStateTest = replaceOnce(
              webStateTest,
              `  test("baseline alignment preserves reverse row order", () => {`,
              gridWebTest + `  test("baseline alignment preserves reverse row order", () => {`,
              "web grid vertical writing baseline test insertion"
            );
          }
          write(webStateTestPath, webStateTest);

          const serverLayoutTestPath = "apps/server/src/layout.test.ts";
          let serverLayoutTest = read(serverLayoutTestPath);
          if (!serverLayoutTest.includes("vertical writing-mode baseline synthesis uses border edge in horizontal auto layout")) {
            const serverTests = block([
              '  test("vertical writing-mode baseline synthesis uses border edge in horizontal auto layout", () => {',
              '    const document = structuredClone(sampleDocument) as DesignFile;',
              '    const frame = document.pages[0].children[0] as any;',
              '    frame.size = { width: 360, height: 160 };',
              '    frame.layout = {',
              '      mode: "auto",',
              '      direction: "horizontal",',
              '      align_items: "baseline",',
              '      justify_content: "start",',
              '      gap: 10,',
              '      padding: { top: 20, right: 20, bottom: 20, left: 20 }',
              '    };',
              '    const title = frame.children[0];',
              '    title.size = { width: 40, height: 96 };',
              '    title.content = {',
              '      type: "text",',
              '      value: "縦書き",',
              '      font_size: 32,',
              '      font_family: "Inter",',
              '      writing_mode: "vertical_rl"',
              '    };',
              '    frame.children.push({',
              '      id: "caption-1",',
              '      kind: "text",',
              '      name: "캡션",',
              '      transform: { x: 0, y: 0, rotation: 0 },',
              '      size: { width: 80, height: 24 },',
              '      style: { fill: "#374151", stroke: null, stroke_width: 0, opacity: 1 },',
              '      content: { type: "text", value: "Caption", font_size: 16, font_family: "Inter" },',
              '      children: []',
              '    });',
              '',
              '    relayoutDesignFile(document);',
              '',
              '    const caption = frame.children.find((node: { id: string }) => node.id === "caption-1");',
              '    expect(title.transform).toMatchObject({ x: 20, y: 20 });',
              '    expect(caption?.transform).toMatchObject({ x: 70, y: 103 });',
              '    expect(title.transform.y + 96).toBe((caption?.transform.y ?? 0) + 13);',
              '  });',
              '',
              '  test("grid layout baseline synthesizes vertical writing-mode border-edge baselines", () => {',
              '    const document = structuredClone(sampleDocument) as DesignFile;',
              '    const frame = document.pages[0].children[0] as any;',
              '    frame.size = { width: 300, height: 140 };',
              '    frame.layout = {',
              '      mode: "grid",',
              '      direction: "horizontal",',
              '      grid_columns: 2,',
              '      grid_rows: 1,',
              '      align_items: "baseline",',
              '      justify_content: "start",',
              '      gap: 0,',
              '      row_gap: 0,',
              '      column_gap: 0,',
              '      padding: { top: 20, right: 20, bottom: 20, left: 20 }',
              '    };',
              '    const title = frame.children[0];',
              '    title.size = { width: 40, height: 96 };',
              '    title.content = {',
              '      type: "text",',
              '      value: "縦書き",',
              '      font_size: 32,',
              '      font_family: "Inter",',
              '      writing_mode: "vertical_rl"',
              '    };',
              '    frame.children.push({',
              '      id: "caption-1",',
              '      kind: "text",',
              '      name: "캡션",',
              '      transform: { x: 0, y: 0, rotation: 0 },',
              '      size: { width: 80, height: 24 },',
              '      style: { fill: "#374151", stroke: null, stroke_width: 0, opacity: 1 },',
              '      content: { type: "text", value: "Caption", font_size: 16, font_family: "Inter" },',
              '      children: []',
              '    });',
              '',
              '    relayoutDesignFile(document);',
              '',
              '    const caption = frame.children.find((node: { id: string }) => node.id === "caption-1");',
              '    expect(title.transform).toMatchObject({ x: 20, y: 20 });',
              '    expect(caption?.transform).toMatchObject({ x: 150, y: 103 });',
              '    expect(title.transform.y + 96).toBe((caption?.transform.y ?? 0) + 13);',
              '  });'
            ]);
            serverLayoutTest = replaceOnce(
              serverLayoutTest,
              `  test("last-baseline alignment matches final text baselines in horizontal auto layout", () => {`,
              serverTests + `  test("last-baseline alignment matches final text baselines in horizontal auto layout", () => {`,
              "server vertical writing baseline tests insertion"
            );
          }
          write(serverLayoutTestPath, serverLayoutTest);

          const e2ePath = "apps/web/e2e/editor-mvp.spec.ts";
          let e2e = read(e2ePath);
          if (!e2e.includes("baseline alignment visibly synthesizes vertical writing mode text to the row border edge")) {
            const e2eTest = block([
              'test("baseline alignment visibly synthesizes vertical writing mode text to the row border edge", async ({ page }) => {',
              '  const { documentId } = await createProjectFromEmptyState(page);',
              '  const response = await page.request.post(`http://127.0.0.1:4317/files/${documentId}/agent/commands`, {',
              '    data: {',
              '      dryRun: false,',
              '      commands: [',
              '        { type: "update_geometry", nodeId: "frame-1", width: 360, height: 160 },',
              '        { type: "update_geometry", nodeId: "text-1", width: 40, height: 96 },',
              '        { type: "update_text", nodeId: "text-1", value: "縦書き" },',
              '        { type: "set_text_writing_mode", nodeId: "text-1", writingMode: "vertical_rl" },',
              '        {',
              '          type: "set_layout",',
              '          nodeId: "frame-1",',
              '          layout: {',
              '            mode: "auto",',
              '            direction: "horizontal",',
              '            align_items: "baseline",',
              '            justify_content: "start",',
              '            gap: 10,',
              '            padding: { top: 20, right: 20, bottom: 20, left: 20 }',
              '          }',
              '        },',
              '        {',
              '          type: "create_text",',
              '          parentId: "frame-1",',
              '          id: "caption-1",',
              '          name: "캡션",',
              '          value: "Caption",',
              '          width: 80,',
              '          height: 24,',
              '          fontSize: 16,',
              '          fontFamily: "Inter"',
              '        }',
              '      ]',
              '    }',
              '  });',
              '  expect(response.ok()).toBeTruthy();',
              '',
              '  const fileResponse = await page.request.get(`http://127.0.0.1:4317/files/${documentId}`);',
              '  expect(fileResponse.ok()).toBeTruthy();',
              '  const filePayload = await fileResponse.json();',
              '  const frame = filePayload.file.pages[0].children[0];',
              '  const caption = frame.children.find((node: { id: string }) => node.id === "caption-1");',
              '  expect(caption.transform).toMatchObject({ x: 70, y: 103 });',
              '',
              '  await page.reload();',
              '  await openFilePanel(page);',
              '  await page.getByTestId("layer-panel").getByText("캡션").click();',
              '  await expect(page.getByTestId("inspector-x")).toHaveValue("70");',
              '  await expect(page.getByTestId("inspector-y")).toHaveValue("103");',
              '});'
            ]);
            e2e = replaceOnce(
              e2e,
              `test("file panel exports a Layo archive and reviews it before import", async ({ page }) => {`,
              e2eTest + `test("file panel exports a Layo archive and reviews it before import", async ({ page }) => {`,
              "Playwright vertical writing baseline proof insertion"
            );
          }
          write(e2ePath, e2e);
          NODE

      - name: RED focused tests
        env:
          NODE_OPTIONS: --conditions=development
        run: |
          set +e
          pnpm --filter @layo/web exec vitest run src/editor-state.test.ts --reporter=dot
          web_status=$?
          pnpm --filter @layo/server exec vitest run src/layout.test.ts --reporter=dot
          server_status=$?
          set -e
          if [ "$web_status" -eq 0 ] || [ "$server_status" -eq 0 ]; then
            echo "Expected both focused suites to fail before implementation. web=$web_status server=$server_status"
            exit 1
          fi
          echo "RED confirmed: focused web and server layout tests fail before implementation."

      - name: Patch implementation and docs
        run: |
          node --input-type=module <<'NODE'
          import { mkdirSync, readFileSync, writeFileSync } from "node:fs";

          const read = (path) => readFileSync(path, "utf8");
          const write = (path, content) => writeFileSync(path, content);
          const block = (lines) => `${lines.join("\n")}\n`;

          function replaceOnce(content, before, after, label) {
            if (!content.includes(before)) {
              throw new Error(`Missing patch target: ${label}`);
            }
            return content.replace(before, after);
          }

          const verticalBaselineBefore = `    if (isVerticalTextWritingMode(node.content.writing_mode)) {\n      const firstBaseline = Math.max(0, Math.min(node.size.height, Math.round(node.size.width / 2)));\n      if (preference === "last") {\n        const descent = Math.max(0, node.size.width - firstBaseline);\n        return Math.max(0, Math.min(node.size.height, node.size.height - descent));\n      }\n      return firstBaseline;\n    }`;
          const verticalBaselineAfter = `    if (isVerticalTextWritingMode(node.content.writing_mode)) {\n      // Horizontal flex/grid baseline groups synthesize orthogonal vertical text\n      // from the block-end border edge.\n      return node.size.height;\n    }`;
          for (const path of ["apps/web/src/editor-state.ts", "apps/server/src/layout.ts"]) {
            write(path, replaceOnce(read(path), verticalBaselineBefore, verticalBaselineAfter, `${path} vertical baseline synthesis`));
          }

          mkdirSync("docs/superpowers/plans", { recursive: true });
          write("docs/superpowers/plans/2026-07-05-penpot-orthogonal-baseline-synthesis.md", block([
            "# Penpot Orthogonal Baseline Synthesis",
            "",
            "## Goal",
            "",
            "Close the Penpot/CSS baseline-alignment gap where vertical writing-mode text in a horizontal auto-layout row or grid row used a width/2 centerline heuristic instead of the synthesized border-edge baseline expected for orthogonal baseline groups.",
            "",
            "## Reference",
            "",
            "- Penpot flexible layouts: https://help.penpot.app/user-guide/designing/flexible-layouts/",
            "- CSS Box Alignment Level 3 synthesized baselines: https://www.w3.org/TR/css-align-3/#baseline-values",
            "- CSS Writing Modes Level 4 text baselines: https://www.w3.org/TR/css-writing-modes-4/#text-baselines",
            "",
            "## Decision",
            "",
            "Adapt the CSS synthesized-baseline rule for Layo's current horizontal flex/grid baseline groups. When a `vertical_rl` or `vertical_lr` text node participates in a horizontal row baseline group, Layo now synthesizes the baseline from the block-end border edge by using the node height. This deliberately does not claim full font-specific baseline metrics or every axis-specific orthogonal case; those remain benchmark risks.",
            "",
            "## Minimal Change Ladder",
            "",
            "- Existing primitives reused: saved text `writing_mode`, existing auto-layout/grid baseline grouping, existing HTTP agent commands, existing Inspector coordinate readouts, and the existing Playwright CLI service runner.",
            "- New code required: one shared solver rule in the web and server layout engines replacing the old width/2 vertical-text baseline heuristic for horizontal row baseline groups.",
            "- Validation preserved: focused web/server geometry tests, Playwright CLI browser proof, Penpot benchmark update, and Full Verification as the PR merge gate.",
            "",
            "## RED Evidence",
            "",
            "Focused web and server layout tests were patched first and failed against the old implementation because the caption stayed at y=27, aligned to the old 20px vertical-text center heuristic, instead of y=103, aligned to the vertical text block-end border edge at 96px.",
            "",
            "## Verification Plan",
            "",
            "- Web state tests cover horizontal auto-layout and grid row baseline geometry with a vertical writing-mode title and horizontal caption.",
            "- Server layout tests cover the same geometry through the storage-side relayout engine.",
            "- Playwright e2e uses HTTP agent commands to create the document state, then verifies the visible browser Inspector reports caption x=70 and y=103 after selecting the layer.",
            "- Full Verification remains the merge gate.",
            "",
            "## Status",
            "",
            "Implemented through the Penpot maturity loop after deployment was explicitly deferred."
          ]));

          const planStatusPath = "docs/superpowers/PLAN_STATUS.md";
          let planStatus = read(planStatusPath);
          if (!planStatus.includes("2026-07-05-penpot-orthogonal-baseline-synthesis.md")) {
            planStatus = replaceOnce(
              planStatus,
              `| --- | --- | --- |\n| \`2026-07-05-penpot-last-baseline-layout.md\``,
              `| --- | --- | --- |\n| \`2026-07-05-penpot-orthogonal-baseline-synthesis.md\` | Completed | Adapts CSS/Penpot baseline synthesis for orthogonal vertical writing-mode text in horizontal auto-layout and grid row baseline groups, replacing the old width/2 heuristic with block-end border-edge synthesis. RED focused web/server tests failed against y=27; GREEN focused tests and Playwright CLI prove y=103. Deployment remains intentionally deferred. |\n| \`2026-07-05-penpot-last-baseline-layout.md\``,
              "PLAN_STATUS completed row"
            );
          }
          write(planStatusPath, planStatus);

          const benchmarkPath = "docs/product/penpot-maturity-benchmark.md";
          let benchmark = read(benchmarkPath);
          benchmark = replaceOnce(
            benchmark,
            "auto-layout and grid row `last_baseline` groups with Inspector, MCP/HTTP, persistence, and CSS `last baseline` code-export handoff, per-item layout `z_index`",
            "auto-layout and grid row `last_baseline` groups with Inspector, MCP/HTTP, persistence, and CSS `last baseline` code-export handoff, horizontal auto-layout and grid row orthogonal vertical writing-mode baseline synthesis from the block-end border edge, per-item layout `z_index`",
            "benchmark layout posture evidence"
          );
          benchmark = benchmark.replaceAll(
            "full Unicode vertical-orientation table fidelity and font-specific vertical glyph substitutions, orthogonal writing-mode baseline groups, and font-specific baseline metrics",
            "full Unicode vertical-orientation table fidelity and font-specific vertical glyph substitutions, remaining orthogonal writing-mode baseline cases outside horizontal row/grid groups, and font-specific baseline metrics"
          );
          benchmark = benchmark.replaceAll(
            "orthogonal writing-mode baseline groups, and font-specific baseline metrics",
            "remaining orthogonal writing-mode baseline cases outside horizontal row/grid groups and font-specific baseline metrics"
          );
          benchmark = replaceOnce(
            benchmark,
            "CSS export keeps using native `writing-mode`; glyph-orientation controls, last-baseline groups,\northogonal writing-mode baseline groups, font-specific baseline metrics, plus remaining deeper resizing semantics remain\nfollow-up layout gaps.",
            "CSS export keeps using native `writing-mode`; full Unicode orientation fidelity, font-specific vertical substitutions, remaining orthogonal baseline cases outside horizontal row/grid groups, font-specific baseline metrics, plus remaining deeper resizing semantics remain follow-up layout gaps.",
            "benchmark vertical text follow-up narrowing"
          );
          if (!benchmark.includes("2026-07-05-penpot-orthogonal-baseline-synthesis.md")) {
            benchmark = replaceOnce(
              benchmark,
              "`2026-07-04-penpot-flex-fill-wrap-direct-parent-resize.md` extends the direct browser canvas evidence into wrapped horizontal auto layout: dragging the selected parent frame from 420 to 360 wide keeps the child in `fill`, recomputes it from 290 to 230 wide before line breaking, and keeps the fixed sibling on the same row while moving from x=320 to x=260. A review follow-up now also proves wrapped fill minimum-contribution distribution: in a 150px row with a 10px gap, one `min_width: 100` fill child sizes to 120px and the second fill child sizes to 20px without overflowing the row.\n",
              "`2026-07-04-penpot-flex-fill-wrap-direct-parent-resize.md` extends the direct browser canvas evidence into wrapped horizontal auto layout: dragging the selected parent frame from 420 to 360 wide keeps the child in `fill`, recomputes it from 290 to 230 wide before line breaking, and keeps the fixed sibling on the same row while moving from x=320 to x=260. A review follow-up now also proves wrapped fill minimum-contribution distribution: in a 150px row with a 10px gap, one `min_width: 100` fill child sizes to 120px and the second fill child sizes to 20px without overflowing the row.\n`2026-07-05-penpot-orthogonal-baseline-synthesis.md` adapts CSS/Penpot horizontal row baseline synthesis for vertical writing-mode text in horizontal auto-layout and grid rows: vertical text now contributes its block-end border edge instead of the old width/2 center heuristic, with web/server geometry tests and Playwright CLI Inspector proof for the caption y=103 alignment. Remaining baseline gaps are axis-specific orthogonal cases outside horizontal rows and font-specific metrics.\n",
              "benchmark recent layout evidence insertion"
            );
          }
          benchmark = benchmark.replaceAll(
            "auto-layout and grid row `last_baseline` groups with Inspector, MCP/HTTP, persistence, and CSS `last baseline` code-export handoff, per-item layout `z_index`",
            "auto-layout and grid row `last_baseline` groups with Inspector, MCP/HTTP, persistence, and CSS `last baseline` code-export handoff, horizontal auto-layout and grid row orthogonal vertical writing-mode baseline synthesis from the block-end border edge, per-item layout `z_index`"
          );
          write(benchmarkPath, benchmark);
          NODE

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: GREEN focused tests
        env:
          NODE_OPTIONS: --conditions=development
        run: |
          pnpm --filter @layo/web exec vitest run src/editor-state.test.ts --reporter=dot
          pnpm --filter @layo/server exec vitest run src/layout.test.ts --reporter=dot
          pnpm exec playwright test apps/web/e2e/editor-mvp.spec.ts --grep "baseline alignment visibly synthesizes vertical writing mode text to the row border edge" --reporter=line
          pnpm run check:penpot-maturity

      - name: Commit final patch
        run: |
          rm .github/workflows/codex-orthogonal-baseline-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/editor-state.ts apps/server/src/layout.ts apps/web/src/editor-state.test.ts apps/server/src/layout.test.ts apps/web/e2e/editor-mvp.spec.ts docs/product/penpot-maturity-benchmark.md docs/superpowers/PLAN_STATUS.md docs/superpowers/plans/2026-07-05-penpot-orthogonal-baseline-synthesis.md .github/workflows/codex-orthogonal-baseline-patch.yml
          git commit -m "Add Penpot orthogonal baseline synthesis"
          git push origin codex/penpot-orthogonal-baseline-synthesis
