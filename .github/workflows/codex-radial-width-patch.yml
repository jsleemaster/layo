name: Codex Radial Width Patch

on:
  push:
    branches:
      - codex/penpot-radial-width-svg-artifact
    paths:
      - .github/workflows/codex-radial-width-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/penpot-radial-width-svg-artifact
      - name: Apply radial width patch
        run: python3 scripts/codex-radial-width-patch.py
      - name: Commit patch and remove runner
        run: |
          rm scripts/codex-radial-width-patch.py .github/workflows/codex-radial-width-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/node-artifacts.ts scripts/codex-radial-width-patch.py .github/workflows/codex-radial-width-patch.yml
          git commit -m "feat: preserve Penpot radial width SVG transforms"
          git push origin HEAD:codex/penpot-radial-width-svg-artifact
