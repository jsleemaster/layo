name: Full Verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/full-verification.yml"
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "scripts/**"
      - "docs/product/**"
      - "docs/process/**"
      - "docs/superpowers/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

permissions:
  contents: write

jobs:
  fix-and-verify-path-parser:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-vector-path-artifacts
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch path parser and restore workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('apps/web/src/node-artifacts.ts')
          text = source.read_text()
          old = r'  return pathData.match(/[a-zA-Z]|[-+]?(?:\\d+\\.?\\d*|\\.\\d+)(?:e[-+]?\\d+)?/gi) ?? [];'
          new = r'  return pathData.match(/[a-zA-Z]|[-+]?(?:\d+\.?\d*|\.\d+)(?:e[-+]?\d+)?/gi) ?? [];'
          if old not in text:
              raise SystemExit('expected over-escaped SVG path token regex not found')
          source.write_text(text.replace(old, new, 1))
          PY
          git fetch origin main
          git show origin/main:.github/workflows/full-verification.yml > .github/workflows/full-verification.yml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Penpot maturity and design rule gates
        run: |
          pnpm run check:penpot-maturity
          pnpm run check:design-rules

      - name: Typecheck
        run: pnpm typecheck

      - name: Web build
        run: pnpm --filter @layo/web build

      - name: Core tests
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm test

      - name: Playwright CLI e2e
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm test:e2e

      - name: Commit verified fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/node-artifacts.ts .github/workflows/full-verification.yml
          git commit -m "Fix Penpot path artifact token parsing"
          git push origin HEAD:codex/penpot-vector-path-artifacts