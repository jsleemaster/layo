name: Full Verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/full-verification.yml"
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "scripts/**"
      - "docs/product/**"
      - "docs/process/**"
      - "docs/superpowers/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

permissions:
  contents: write

concurrency:
  group: full-verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex-polish:
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/vertical-text-canvas-rendering'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/vertical-text-canvas-rendering
          fetch-depth: 0

      - name: Polish branch files
        run: |
          python3 <<'PY'
          from pathlib import Path

          app_path = Path("apps/web/src/App.tsx")
          app = app_path.read_text()
          render_body_index = app.index('const renderBody =')
          start_marker = ') : node.kind === "text" && node.content.type === "text" ? (\n'
          end_marker = '    ) : (\n      <Rect\n'
          start = app.index(start_marker, render_body_index)
          end = app.index(end_marker, start)
          replacement = "\n".join([
              '    ) : node.kind === "text" && node.content.type === "text" ? (',
              '      isVerticalCanvasTextMode(node.content.writing_mode) ? (',
              '        <VerticalCanvasText',
              '          width={node.size.width}',
              '          height={node.size.height}',
              '          value={node.content.value}',
              '          fontSize={node.content.font_size}',
              '          fontFamily={node.content.font_family}',
              '          fill={node.style.fill}',
              '          writingMode={node.content.writing_mode}',
              '          shadowProps={shadowProps}',
              '        />',
              '      ) : (',
              '        <Text',
              '          width={node.size.width}',
              '          height={node.size.height}',
              '          text={node.content.value}',
              '          fontSize={node.content.font_size}',
              '          fontFamily={node.content.font_family}',
              '          fill={node.style.fill}',
              '          {...shadowProps}',
              '        />',
              '      )',
              ''
          ])
          app = app[:start] + replacement + app[end:]
          app_path.write_text(app)

          status_path = Path("docs/superpowers/PLAN_STATUS.md")
          status = status_path.read_text()
          lines = [
              line
              for line in status.splitlines(keepends=True)
              if not line.startswith('| `2026-07-01-figma-image-asset-import.md` | Blocked |')
          ]
          status = ''.join(lines)
          completed_row = '| `2026-07-01-figma-image-asset-import.md` | Completed | PR #199 merged as `d3c2e93cf3a00a5447c667df1316af390e26b6b5`. Figma JSON package imports preserve packaged rectangle image fills as Layo image nodes backed by local asset storage; unpackaged fills, components, variants, effects, advanced style fidelity, and Penpot ZIP shape mapping remain follow-up import gaps. |\n'
          if completed_row not in status:
              completed_index = status.index('## Completed Plans')
              header_marker = '| --- | --- | --- |\n'
              header_end = status.index(header_marker, completed_index) + len(header_marker)
              status = status[:header_end] + completed_row + status[header_end:]
          status_path.write_text(status)
          PY

      - name: Restore workflow and commit polish
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/full-verification.yml > .github/workflows/full-verification.yml
          git config user.name "codex-patch-bot"
          git config user.email "codex-patch-bot@users.noreply.github.com"
          git add apps/web/src/App.tsx docs/superpowers/PLAN_STATUS.md .github/workflows/full-verification.yml
          if git diff --cached --quiet; then
            echo "No polish changes to commit"
            exit 0
          fi
          git commit -m "Polish vertical text canvas branch"
          git push origin HEAD:codex/vertical-text-canvas-rendering

  full-verification:
    needs: codex-polish
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Penpot maturity and design rule gates
        run: |
          pnpm run check:penpot-maturity
          pnpm run check:design-rules

      - name: Typecheck
        run: pnpm typecheck

      - name: Web build
        run: pnpm --filter @layo/web build

      - name: Core tests
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm test

      - name: Playwright CLI e2e
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm test:e2e
