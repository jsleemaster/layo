name: Codex radial final docs patch

on:
  push:
    branches:
      - codex/penpot-radial-gradient-svg-artifact

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Apply final radial docs patch
        run: python3 scripts/codex-radial-final-docs-patch.py
      - name: Commit final docs patch and remove temporary files
        run: |
          rm -f .github/workflows/codex-radial-final-docs-patch.yml scripts/codex-radial-final-docs-patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/superpowers/plans/2026-07-06-penpot-radial-gradient-svg-artifact.md docs/product/penpot-radial-gradient-svg-artifact-delta.md docs/superpowers/PLAN_STATUS.md .github/workflows/codex-radial-final-docs-patch.yml scripts/codex-radial-final-docs-patch.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: finalize Penpot radial SVG artifact evidence"
          git push origin HEAD:${{ github.ref_name }}
