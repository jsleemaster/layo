name: Codex Radial PDF Docs Patch

on:
  push:
    branches:
      - codex/penpot-radial-pdf-artifact
    paths:
      - .github/workflows/codex-radial-pdf-docs-patch.yml

permissions:
  contents: write

jobs:
  patch-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/penpot-radial-pdf-artifact
      - name: Apply docs patch
        run: python3 scripts/codex-radial-pdf-docs-patch.py
      - name: Commit docs patch and remove runner
        run: |
          rm scripts/codex-radial-pdf-docs-patch.py .github/workflows/codex-radial-pdf-docs-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/superpowers/PLAN_STATUS.md docs/product/penpot-maturity-benchmark.md scripts/codex-radial-pdf-docs-patch.py .github/workflows/codex-radial-pdf-docs-patch.yml
          git commit -m "docs: record Penpot radial PDF artifact slice"
          git push origin HEAD:codex/penpot-radial-pdf-artifact
