name: Full Verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/full-verification.yml"
      - "apps/**"
      - "packages/**"
      - "docs/product/**"

permissions:
  contents: write

jobs:
  patch-vector-path-exporter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-vector-path-artifacts
          fetch-depth: 0

      - name: Patch exporter source
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('apps/web/src/node-artifacts.ts')
          text = path.read_text()

          def need(marker):
              if marker not in text:
                  raise SystemExit(f'missing marker: {marker}')

          need('function svgEllipseAttributes(width: number, height: number) {')
          text = text.replace(
              'function clipPolygonPointsForNode(node: RendererNode) {',
              '''function clipSourcePathDataForNode(node: RendererNode) {
  const pathData = nodeClip(node)?.source?.pathData;
  return typeof pathData === "string" && pathData.trim() ? pathData.trim() : null;
}

function svgPathElement(pathData: string, attributes = "") {
  return `<path d="${escapeSvgText(pathData)}"${attributes} />`;
}

function clipPolygonPointsForNode(node: RendererNode) {''',
              1,
          )

          text = text.replace(
              '  const polygonPoints = svgClipPolygonPointsForNode(node);\n\n  if (nodeClipUsesAlphaMask(node)) {',
              '  const pathData = clipSourcePathDataForNode(node);\n  const polygonPoints = svgClipPolygonPointsForNode(node);\n\n  if (nodeClipUsesAlphaMask(node)) {',
              1,
          )
          text = text.replace(
              '    const maskShape = polygonPoints\n      ? `<polygon points="${escapeSvgText(polygonPoints)}" fill="#fff" fill-opacity="${opacity}" />`\n      : nodeClipUsesEllipseShape(node)',
              '    const maskShape = pathData\n      ? svgPathElement(pathData, ` fill="#fff" fill-opacity="${opacity}"`)\n      : polygonPoints\n        ? `<polygon points="${escapeSvgText(polygonPoints)}" fill="#fff" fill-opacity="${opacity}" />`\n        : nodeClipUsesEllipseShape(node)',
              1,
          )
          text = text.replace(
              '  const clipShape = polygonPoints\n    ? `<polygon points="${escapeSvgText(polygonPoints)}" />`\n    : nodeClipUsesEllipseShape(node)',
              '  const clipShape = pathData\n    ? svgPathElement(pathData)\n    : polygonPoints\n      ? `<polygon points="${escapeSvgText(polygonPoints)}" />`\n      : nodeClipUsesEllipseShape(node)',
              1,
          )

          text = text.replace(
              '  const assetAttribute = node.content.type === "image" ? ` data-image-asset-id="${escapeSvgText(node.content.asset_id)}"` : "";\n  if (nodeClipUsesEllipseShape(node)) {',
              '  const assetAttribute = node.content.type === "image" ? ` data-image-asset-id="${escapeSvgText(node.content.asset_id)}"` : "";\n  const pathData = clipSourcePathDataForNode(node);\n  if (pathData) {\n    return `<path ${svgNodeAttributes(node)}${assetAttribute} d="${escapeSvgText(pathData)}" ${fillAttribute} ${strokeAttribute} stroke-width="${Math.max(0, Math.round(node.style.stroke_width))}"${opacity}${filter} />`;\n  }\n  if (nodeClipUsesEllipseShape(node)) {',
              1,
          )

          pdf_helper = r'''
function svgPathTokens(pathData: string) {
  return pathData.match(/[a-zA-Z]|[-+]?(?:\d+\.?\d*|\.\d+)(?:e[-+]?\d+)?/gi) ?? [];
}

function pdfPathCommandsFromSvgPathData(pathData: string, pageHeight: number, x: number, y: number) {
  const tokens = svgPathTokens(pathData);
  if (tokens.length === 0) {
    return null;
  }

  let index = 0;
  let command = "";
  let current = { x: 0, y: 0 };
  let subpathStart = { x: 0, y: 0 };
  const commands: string[] = [];
  const isCommand = (token: string) => /^[a-zA-Z]$/.test(token);
  const hasNumber = () => index < tokens.length && !isCommand(tokens[index]);
  const readNumber = () => {
    if (!hasNumber()) return null;
    const value = Number(tokens[index]);
    index += 1;
    return Number.isFinite(value) ? value : null;
  };
  const absolutePoint = (pointX: number, pointY: number, relative: boolean) => ({
    x: relative ? current.x + pointX : pointX,
    y: relative ? current.y + pointY : pointY
  });
  const pdfX = (pointX: number) => formatNumber(x + pointX);
  const pdfY = (pointY: number) => formatNumber(pageHeight - y - pointY);
  const lineTo = (point: { x: number; y: number }) => {
    commands.push(`${pdfX(point.x)} ${pdfY(point.y)} l`);
    current = point;
  };

  while (index < tokens.length) {
    if (isCommand(tokens[index])) {
      command = tokens[index];
      index += 1;
    } else if (!command) {
      return null;
    }

    const relative = command === command.toLowerCase();
    switch (command.toUpperCase()) {
      case "M": {
        let first = true;
        while (hasNumber()) {
          const pointX = readNumber();
          const pointY = readNumber();
          if (pointX === null || pointY === null) return null;
          const point = absolutePoint(pointX, pointY, relative);
          commands.push(`${pdfX(point.x)} ${pdfY(point.y)} ${first ? "m" : "l"}`);
          current = point;
          if (first) {
            subpathStart = point;
            first = false;
          }
        }
        command = relative ? "l" : "L";
        break;
      }
      case "L":
        while (hasNumber()) {
          const pointX = readNumber();
          const pointY = readNumber();
          if (pointX === null || pointY === null) return null;
          lineTo(absolutePoint(pointX, pointY, relative));
        }
        break;
      case "H":
        while (hasNumber()) {
          const pointX = readNumber();
          if (pointX === null) return null;
          lineTo({ x: relative ? current.x + pointX : pointX, y: current.y });
        }
        break;
      case "V":
        while (hasNumber()) {
          const pointY = readNumber();
          if (pointY === null) return null;
          lineTo({ x: current.x, y: relative ? current.y + pointY : pointY });
        }
        break;
      case "C":
        while (hasNumber()) {
          const x1 = readNumber();
          const y1 = readNumber();
          const x2 = readNumber();
          const y2 = readNumber();
          const pointX = readNumber();
          const pointY = readNumber();
          if (x1 === null || y1 === null || x2 === null || y2 === null || pointX === null || pointY === null) return null;
          const first = absolutePoint(x1, y1, relative);
          const second = absolutePoint(x2, y2, relative);
          const point = absolutePoint(pointX, pointY, relative);
          commands.push(`${pdfX(first.x)} ${pdfY(first.y)} ${pdfX(second.x)} ${pdfY(second.y)} ${pdfX(point.x)} ${pdfY(point.y)} c`);
          current = point;
        }
        break;
      case "Q":
        while (hasNumber()) {
          const qx = readNumber();
          const qy = readNumber();
          const pointX = readNumber();
          const pointY = readNumber();
          if (qx === null || qy === null || pointX === null || pointY === null) return null;
          const control = absolutePoint(qx, qy, relative);
          const point = absolutePoint(pointX, pointY, relative);
          const first = { x: current.x + (2 / 3) * (control.x - current.x), y: current.y + (2 / 3) * (control.y - current.y) };
          const second = { x: point.x + (2 / 3) * (control.x - point.x), y: point.y + (2 / 3) * (control.y - point.y) };
          commands.push(`${pdfX(first.x)} ${pdfY(first.y)} ${pdfX(second.x)} ${pdfY(second.y)} ${pdfX(point.x)} ${pdfY(point.y)} c`);
          current = point;
        }
        break;
      case "Z":
        commands.push("h");
        current = subpathStart;
        break;
      default:
        return null;
    }
  }

  return commands.length > 0 ? commands : null;
}
'''
          text = text.replace(
              'const pdfEllipseKappa = 0.552284749831;\n\nfunction pdfEllipsePathCommands',
              'const pdfEllipseKappa = 0.552284749831;\n' + pdf_helper + '\nfunction pdfEllipsePathCommands',
              1,
          )
          text = text.replace(
              '  const pathX = x + inset;\n  const pathY = y + inset;\n  if (nodeClipUsesEllipseShape(node)) {',
              '  const pathX = x + inset;\n  const pathY = y + inset;\n  if (inset === 0) {\n    const pathData = clipSourcePathDataForNode(node);\n    const pathCommands = pathData ? pdfPathCommandsFromSvgPathData(pathData, pageHeight, pathX, pathY) : null;\n    if (pathCommands) {\n      return pathCommands;\n    }\n  }\n  if (nodeClipUsesEllipseShape(node)) {',
              1,
          )

          path.write_text(text)
          PY

      - name: Commit patched exporter
        run: |
          git config user.name "jsleemaster"
          git config user.email "75053960+jsleemaster@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/full-verification.yml
          git add apps/web/src/node-artifacts.ts .github/workflows/full-verification.yml
          git commit -m "Preserve Penpot path artifact geometry [green-pipeline-patch]"
          git push origin HEAD:codex/penpot-vector-path-artifacts
