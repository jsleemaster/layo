name: Codex Remote App Patch

on:
  push:
    branches:
      - codex/vertical-text-unicode-orientation

permissions:
  contents: write

concurrency:
  group: codex-vertical-text-patch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch-app:
    if: github.event.head_commit.message == 'Run remote App patch workflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/vertical-text-unicode-orientation
      - name: Patch App.tsx to use the shared orientation helper
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path("apps/web/src/App.tsx")
          workflow_path = Path(".github/workflows/codex-vertical-text-patch.yml")
          text = app_path.read_text(encoding="utf-8")

          import_line = 'import { apiUrl } from "./api-base";\n'
          helper_import = 'import { isSidewaysVerticalCanvasGlyph } from "./vertical-text-orientation";\n'
          if helper_import not in text:
              if import_line not in text:
                  raise SystemExit("api-base import anchor not found")
              text = text.replace(import_line, import_line + helper_import, 1)

          old_function = '''
function isSidewaysVerticalCanvasGlyph(glyph: string, textOrientation: TextOrientation): boolean {
  if (textOrientation === "sideways") {
    return glyph !== " ";
  }
  if (textOrientation === "upright") {
    return false;
  }
  return /^[\\u0021-\\u007e]$/.test(glyph);
}
'''
          if old_function in text:
              text = text.replace(old_function, "\n", 1)
          elif "function isSidewaysVerticalCanvasGlyph" in text:
              raise SystemExit("orientation helper function shape changed")

          app_path.write_text(text, encoding="utf-8")
          if workflow_path.exists():
              workflow_path.unlink()
          PY
      - name: Commit patched App.tsx
        run: |
          git config user.name "codex-remote-patch"
          git config user.email "codex-remote-patch@users.noreply.github.com"
          git add apps/web/src/App.tsx .github/workflows/codex-vertical-text-patch.yml
          git diff --cached --quiet && exit 1
          git commit -m "Wire canvas text to Unicode orientation helper [skip ci]"
          git push origin HEAD:codex/vertical-text-unicode-orientation
