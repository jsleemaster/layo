name: Codex radial width doc cleanup

on:
  push:
    branches:
      - codex/radial-width-doc-evidence-cleanup
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/radial-width-doc-evidence-cleanup
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Patch final evidence docs
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          function replaceOnce(path, from, to) {
            const current = readFileSync(path, 'utf8');
            if (!current.includes(from)) {
              throw new Error(`${path}: expected text not found`);
            }
            writeFileSync(path, current.replace(from, to), 'utf8');
          }

          replaceOnce(
            'docs/product/penpot-radial-width-raster-canvas-delta.md',
            '- GREEN: PR-head Full Verification is required before merge, with deployment intentionally deferred because Vercel is rate-limited and not part of this product-maturity slice.',
            '- GREEN: PR-head Full Verification #28780614235 passed, including typecheck, web build, Core tests, and Playwright CLI e2e. Storage Restore Drill #28780614255 and Storage Backup Retention #28780614275 also passed for the same head. PR #260 was squash-merged as `630fd73b62e04aaa10e63409c0fc6f9f6ccacc53`. Deployment remains intentionally deferred because Vercel is rate-limited and not part of this product-maturity slice.'
          );

          replaceOnce(
            'docs/superpowers/PLAN_STATUS.md',
            'The regression is `apps/web/e2e/external-migration-penpot-stroke-gradient.spec.ts`; RED Full Verification #28779327961 failed in Playwright CLI e2e before implementation because `verticalProbe.b` was 136 instead of greater than `verticalProbe.r + 40`. Final PR-head Full Verification is the merge gate for this slice. Product delta is recorded in `docs/product/penpot-radial-width-raster-canvas-delta.md`.',
            'The regression is `apps/web/e2e/external-migration-penpot-stroke-gradient.spec.ts`; RED Full Verification #28779327961 failed in Playwright CLI e2e before implementation because `verticalProbe.b` was 136 instead of greater than `verticalProbe.r + 40`. GREEN Full Verification #28780614235 passed after the implementation and type-compatibility repair; Storage Restore Drill #28780614255 and Storage Backup Retention #28780614275 also passed. PR #260 was squash-merged as `630fd73b62e04aaa10e63409c0fc6f9f6ccacc53`. Product delta is recorded in `docs/product/penpot-radial-width-raster-canvas-delta.md`.'
          );
          NODE
      - name: Remove temporary workflow
        run: rm .github/workflows/codex-radial-width-doc-cleanup.yml
      - name: Commit cleanup
        run: |
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git add docs/product/penpot-radial-width-raster-canvas-delta.md docs/superpowers/PLAN_STATUS.md .github/workflows/codex-radial-width-doc-cleanup.yml
          git commit -m "Record final radial width verification evidence"
          git push origin HEAD:codex/radial-width-doc-evidence-cleanup
