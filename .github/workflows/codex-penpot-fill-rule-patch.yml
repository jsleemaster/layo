name: Codex Penpot Fill Rule Patch

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/codex-penpot-fill-rule-patch.yml"
  pull_request:
    paths:
      - "scripts/codex/penpot-fill-rule-artifacts.mjs"
      - "apps/web/src/node-artifacts-fill-rule.test.ts"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-path-fill-rule-artifacts
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply fill-rule patch
        run: node scripts/codex/penpot-fill-rule-artifacts.mjs

      - name: Focused artifact tests
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm --filter @layo/web test src/node-artifacts-fill-rule.test.ts src/node-artifacts.test.ts

      - name: Commit implementation
        run: |
          git config user.name "codex"
          git config user.email "codex@users.noreply.github.com"
          git add apps/web/src/node-artifacts.ts packages/renderer/src/index.ts apps/web/src/node-artifacts-fill-rule.test.ts docs/product/penpot-maturity-benchmark.md docs/product/penpot-path-fill-rule-artifacts-delta.md scripts/codex/penpot-fill-rule-artifacts.mjs
          git commit -m "fix(web): preserve even-odd path artifact fill rules"
          git push origin HEAD:codex/penpot-path-fill-rule-artifacts
