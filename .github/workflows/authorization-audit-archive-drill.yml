name: Authorization Audit Archive Drill

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/authorization-audit-archive-drill.yml"
      - "apps/server/src/team-authorization-audit-operator.ts"
      - "apps/server/src/team-authorization-audit-operator.test.ts"
      - "apps/server/src/team-authorization-audit-operator-postgres.test.ts"
      - "apps/server/src/team-authorization-audit-cli.ts"
      - "apps/server/src/team-authorization-postgres.ts"
      - "apps/server/package.json"

permissions:
  contents: read

jobs:
  authorization-audit-archive-drill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: layo
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d layo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Purpose: prove audit archive crash retry and retention against operator-owned PostgreSQL.
      LAYO_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/layo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run PostgreSQL archive and retention drill
        env:
          NODE_OPTIONS: --conditions=development
        run: pnpm --filter @layo/server test -- team-authorization-audit-operator-postgres.test.ts
