name: Codex radial stroke token fallback fix

on:
  push:
    branches:
      - codex/penpot-radial-stroke-raster-canvas
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/penpot-radial-stroke-raster-canvas

      - name: Patch radial stroke fallback token
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const appPath = "apps/web/src/App.tsx";
          let app = fs.readFileSync(appPath, "utf8");
          const before = '        fill={node.style.stroke ?? "#000000"}';
          const after = '        fill={node.style.stroke ?? editorKonvaTokens.selection.stroke}';
          if (!app.includes(before)) {
            throw new Error("radial stroke fallback raw color target missing");
          }
          app = app.replace(before, after);
          fs.writeFileSync(appPath, app);
          NODE

      - name: Commit patch
        run: |
          rm .github/workflows/codex-radial-stroke-token-fix.yml
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git status --short
          git add apps/web/src/App.tsx .github/workflows/codex-radial-stroke-token-fix.yml
          git commit -m "Use token fallback for radial stroke overlay"
          git push origin codex/penpot-radial-stroke-raster-canvas
